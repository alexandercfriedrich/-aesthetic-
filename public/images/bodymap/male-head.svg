<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 384" width="320" height="384">
  <rect width="320" height="384" fill="#f8f4f0"/>
  <!-- Neck (broader for male) -->
  <rect x="138" y="268" width="44" height="60" rx="12" fill="#e8d5c4" stroke="#c9a98a" stroke-width="1.5"/>
  <!-- Head shape (slightly more square jaw for male) -->
  <path d="M72 200 Q72 64 160 56 Q248 64 248 200 Q248 256 226 268 Q194 284 160 284 Q126 284 94 268 Q72 256 72 200 Z" fill="#e8d5c4" stroke="#c9a98a" stroke-width="1.5"/>
  <!-- Short hair -->
  <path d="M72 160 Q72 72 160 60 Q248 72 248 160 L244 148 Q220 88 160 84 Q100 88 76 148 Z" fill="#5c4033"/>
  <!-- Face: ears -->
  <ellipse cx="74" cy="178" rx="12" ry="18" fill="#e8d5c4" stroke="#c9a98a" stroke-width="1.5"/>
  <ellipse cx="246" cy="178" rx="12" ry="18" fill="#e8d5c4" stroke="#c9a98a" stroke-width="1.5"/>
  <!-- Eyebrows (straight, thick for male) -->
  <path d="M108 138 L148 136" stroke="#5c4033" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M172 136 L212 138" stroke="#5c4033" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="130" cy="155" rx="16" ry="11" fill="white" stroke="#c9a98a" stroke-width="1"/>
  <ellipse cx="190" cy="155" rx="16" ry="11" fill="white" stroke="#c9a98a" stroke-width="1"/>
  <circle cx="130" cy="155" r="7" fill="#4a3728"/>
  <circle cx="190" cy="155" r="7" fill="#4a3728"/>
  <circle cx="132" cy="153" r="2.5" fill="white"/>
  <circle cx="192" cy="153" r="2.5" fill="white"/>
  <!-- Eyelids -->
  <path d="M114 148 Q130 140 146 148" stroke="#5c4033" stroke-width="2" fill="none"/>
  <path d="M174 148 Q190 140 206 148" stroke="#5c4033" stroke-width="2" fill="none"/>
  <!-- Nose (broader for male) -->
  <path d="M154 168 L148 200 Q160 208 172 200 L166 168" stroke="#c9a98a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="150" cy="202" rx="6" ry="5" fill="#dfc5b0" stroke="#c9a98a" stroke-width="0.8"/>
  <ellipse cx="170" cy="202" rx="6" ry="5" fill="#dfc5b0" stroke="#c9a98a" stroke-width="0.8"/>
  <!-- Mouth (wider, more defined for male) -->
  <path d="M134 230 Q160 238 186 230" stroke="#c9a98a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M134 230 Q160 224 186 230" stroke="#c9a98a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Jawline definition -->
  <path d="M94 210 Q88 248 100 262 Q128 280 160 282 Q192 280 220 262 Q232 248 226 210" stroke="#c9a98a" stroke-width="1" fill="none"/>
  <!-- Stubble / beard suggestion -->
  <ellipse cx="160" cy="248" rx="40" ry="24" fill="#c9a98a" opacity="0.08"/>
</svg>
