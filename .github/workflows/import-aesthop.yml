name: ÄsthOp Import

on:
  workflow_dispatch:
    inputs:
      bundeslaender:
        description: 'Kommagetrennte Bundesländer (leer = alle 9)'
        required: false
        default: ''
      operations:
        description: 'Kommagetrennte Operationen (leer = alle 13)'
        required: false
        default: ''
      no_enrich:
        description: 'Google-Places-Anreicherung überspringen (true/false)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run ÄsthOp import
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          ARGS=""
          # Build --bundesland flags
          if [ -n "${{ inputs.bundeslaender }}" ]; then
            IFS=',' read -ra BL <<< "${{ inputs.bundeslaender }}"
            for b in "${BL[@]}"; do
              ARGS="$ARGS --bundesland \"$(echo $b | xargs)\""
            done
          fi
          # Build --operation flags
          if [ -n "${{ inputs.operations }}" ]; then
            IFS=',' read -ra OPS <<< "${{ inputs.operations }}"
            for o in "${OPS[@]}"; do
              ARGS="$ARGS --operation \"$(echo $o | xargs)\""
            done
          fi
          # Optional: skip enrichment
          if [ "${{ inputs.no_enrich }}" = "true" ]; then
            ARGS="$ARGS --no-enrich"
          fi
          eval npx tsx scripts/import-aesthop.ts $ARGS
